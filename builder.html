<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge.cv – Build Your Resume</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0A0A0B;
            --surface: #111115;
            --border: #2a2a2e;
            --text: #FAFAFA;
            --primary: #F97316;
            --primary-hover: #ff9033;
            --secondary: #3B82F6;
            --success: #22C55E;
            --danger: #EF4444;
            --warning: #F59E0B;
        }
        body.light {
            --bg: #F8FAFC;
            --surface: #FFFFFF;
            --border: #E2E8F0;
            --text: #0F172A;
            --primary: #2563EB;
            --primary-hover: #3B82F6;
        }
        body {
            background: var(--bg);
            font-family: 'Geist', sans-serif;
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.2s;
        }
        .top-bar {
            background: var(--surface);
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 1.4rem; font-weight: 700; }
        .logo span { color: var(--primary); }
        .top-actions { display: flex; gap: 1rem; align-items: center; }
        .mode-toggle { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text); }
        .btn-download { background: var(--primary); color: #fff; border: none; padding: 0.4rem 1rem; border-radius: 30px; cursor: pointer; font-weight: 600; }
        .template-switcher {
            background: var(--surface);
            padding: 0.6rem 2rem;
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
        }
        .temp-btn {
            background: none;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .temp-btn.active, .temp-btn:hover { background: var(--primary); color: #fff; }
        .builder { display: flex; flex: 1; overflow: hidden; }
        .form-panel {
            width: 460px;
            background: var(--surface);
            overflow-y: auto;
            padding: 1.5rem;
            border-right: 1px solid var(--border);
        }
        .form-panel h2 { font-size: 1.2rem; margin: 1rem 0 0.6rem; color: var(--primary); border-left: 4px solid var(--primary); padding-left: 10px; }
        .form-group { margin-bottom: 0.8rem; }
        label { display: block; font-size: 0.75rem; font-weight: 600; margin-bottom: 4px; color: var(--text); opacity: 0.7; }
        input, textarea, select {
            width: 100%;
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-family: 'Geist', sans-serif;
            font-size: 0.85rem;
        }
        .entry-card { background: rgba(128,128,128,0.05); border-radius: 16px; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border); }
        .add-btn { background: none; border: 1px dashed var(--primary); color: var(--primary); padding: 6px; border-radius: 30px; width: 100%; cursor: pointer; margin-top: 6px; }
        .remove-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 0.7rem; }
        .preview-panel { flex: 1; background: var(--bg); overflow-y: auto; padding: 2rem; display: flex; justify-content: center; }
        .cv-preview { width: 210mm; background: white; color: #111; border-radius: 12px; box-shadow: 0 20px 35px rgba(0,0,0,0.2); padding: 2rem; min-height: 297mm; }
        .ats-panel { background: var(--surface); padding: 1rem; border-radius: 16px; margin-bottom: 1rem; border: 1px solid var(--border); }
        .roast-btn { background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 30px; cursor: pointer; font-size: 0.8rem; margin-left: 1rem; }
        @media print { .top-bar, .template-switcher, .form-panel, .ats-panel, .roast-btn, .mode-toggle { display: none; } .builder { display: block; } .preview-panel { padding: 0; } .cv-preview { box-shadow: none; margin: 0; width: 100%; } }
    </style>
</head>
<body>
<div class="top-bar">
    <div class="logo">forge<span>.cv</span></div>
    <div class="top-actions">
        <button class="mode-toggle" id="modeToggle"><i class="fas fa-moon"></i></button>
        <button class="btn-download" id="downloadBtn"><i class="fas fa-download"></i> PDF</button>
    </div>
</div>
<div class="template-switcher" id="templateSwitcher">
    <button class="temp-btn" data-temp="forge">⚡ Forge</button>
    <button class="temp-btn" data-temp="faang">🦾 FAANG</button>
    <button class="temp-btn" data-temp="anvil">🔨 Anvil</button>
    <button class="temp-btn" data-temp="spark">✨ Spark</button>
    <button class="temp-btn" data-temp="phoenix">🔥 Phoenix</button>
</div>
<div class="builder">
    <div class="form-panel" id="formPanel"></div>
    <div class="preview-panel">
        <div style="width: 100%; max-width: 210mm;">
            <div class="ats-panel" id="atsPanel">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <strong>📊 ATS Score: <span id="atsScore">0</span>%</strong>
                    <button class="roast-btn" id="roastBtn">🔥 Roast my resume</button>
                </div>
                <div style="background: #2a2a2e; border-radius: 20px; margin-top: 8px; height: 8px;"><div id="atsBar" style="height: 8px; border-radius: 20px; width: 0%; background: var(--danger);"></div></div>
                <div id="keywordFeedback" style="font-size: 0.75rem; margin-top: 8px;"></div>
            </div>
            <div class="cv-preview" id="cvPreview"></div>
        </div>
    </div>
</div>

<script>
    // ---------- GLOBAL ----------
    let currentTemplate = localStorage.getItem('selectedTemplate') || 'forge';
    let formData = {
        fullName: '', jobTitle: '', email: '', phone: '', location: '', linkedin: '', github: '', summary: '',
        skills: '', certifications: '', volunteer: '', jobDescription: '',
        educations: [], experiences: []
    };

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;': '&gt;'); }
    function saveToStorage() { localStorage.setItem('cvData', JSON.stringify(formData)); localStorage.setItem('selectedTemplate', currentTemplate); }
    function loadFromStorage() {
        const saved = localStorage.getItem('cvData');
        if (saved) { const data = JSON.parse(saved); formData = { ...formData, ...data }; }
        const savedTemp = localStorage.getItem('selectedTemplate');
        if (savedTemp) currentTemplate = savedTemp;
    }

    // ---------- RENDER FORM (dynamic) ----------
    function renderForm() {
        const panel = document.getElementById('formPanel');
        panel.innerHTML = `
            <h2>Job Target (for ATS & Roast)</h2>
            <div class="form-group"><label>Job description (paste here)</label><textarea id="jobDescription" rows="3" placeholder="Paste the job posting..."></textarea></div>
            <h2>Personal Info</h2>
            <div class="form-group"><label>Full name</label><input id="fullName" value="${escapeHtml(formData.fullName)}"></div>
            <div class="form-group"><label>Job title</label><input id="jobTitle" value="${escapeHtml(formData.jobTitle)}"></div>
            <div class="form-group"><label>Email</label><input id="email" value="${escapeHtml(formData.email)}"></div>
            <div class="form-group"><label>Phone</label><input id="phone" value="${escapeHtml(formData.phone)}"></div>
            <div class="form-group"><label>Location</label><input id="location" value="${escapeHtml(formData.location)}"></div>
            <div class="form-group"><label>LinkedIn URL</label><input id="linkedin" value="${escapeHtml(formData.linkedin)}"></div>
            <div class="form-group"><label>GitHub URL</label><input id="github" value="${escapeHtml(formData.github)}"></div>
            <div class="form-group"><label>Professional summary</label><textarea id="summary" rows="3">${escapeHtml(formData.summary)}</textarea></div>
            <h2>Education</h2><div id="eduContainer"></div><button class="add-btn" id="addEduBtn">+ Add education</button>
            <h2>Experience</h2><div id="expContainer"></div><button class="add-btn" id="addExpBtn">+ Add experience</button>
            <h2>Skills</h2><div class="form-group"><textarea id="skills" rows="2" placeholder="Comma separated">${escapeHtml(formData.skills)}</textarea></div>
            <h2>Certifications</h2><div class="form-group"><textarea id="certifications" rows="2">${escapeHtml(formData.certifications)}</textarea></div>
            <h2>Volunteer</h2><div class="form-group"><textarea id="volunteer" rows="2">${escapeHtml(formData.volunteer)}</textarea></div>
        `;
        // dynamic education
        const eduContainer = document.getElementById('eduContainer');
        eduContainer.innerHTML = '';
        formData.educations.forEach((edu, idx) => {
            const card = document.createElement('div'); card.className = 'entry-card';
            card.innerHTML = `<input class="edu-degree" placeholder="Degree" value="${escapeHtml(edu.degree)}" style="width:100%; margin-bottom:5px;"><input class="edu-school" placeholder="School" value="${escapeHtml(edu.school)}" style="width:100%; margin-bottom:5px;"><input class="edu-year" placeholder="Year" value="${escapeHtml(edu.year)}" style="width:100%; margin-bottom:5px;"><button class="remove-btn" data-idx="${idx}">✖ Remove</button>`;
            eduContainer.appendChild(card);
        });
        const expContainer = document.getElementById('expContainer');
        expContainer.innerHTML = '';
        formData.experiences.forEach((exp, idx) => {
            const card = document.createElement('div'); card.className = 'entry-card';
            card.innerHTML = `<input class="exp-title" placeholder="Title" value="${escapeHtml(exp.title)}" style="width:100%; margin-bottom:5px;"><input class="exp-company" placeholder="Company" value="${escapeHtml(exp.company)}" style="width:100%; margin-bottom:5px;"><input class="exp-year" placeholder="Year" value="${escapeHtml(exp.year)}" style="width:100%; margin-bottom:5px;"><textarea class="exp-desc" placeholder="Description" rows="2" style="width:100%;">${escapeHtml(exp.desc)}</textarea><button class="remove-btn" data-idx="${idx}">✖ Remove</button>`;
            expContainer.appendChild(card);
        });
        attachFormEvents();
    }

    function attachFormEvents() {
        const ids = ['fullName','jobTitle','email','phone','location','linkedin','github','summary','skills','certifications','volunteer','jobDescription'];
        ids.forEach(id => { const el = document.getElementById(id); if(el) el.addEventListener('input', (e) => { formData[id] = e.target.value; updatePreviewAndATS(); saveToStorage(); }); });
        document.getElementById('addEduBtn')?.addEventListener('click', () => { formData.educations.push({ degree:'', school:'', year:'' }); renderForm(); updatePreviewAndATS(); saveToStorage(); });
        document.querySelectorAll('#eduContainer .remove-btn').forEach(btn => { btn.addEventListener('click', (e) => { const idx = parseInt(btn.getAttribute('data-idx')); formData.educations.splice(idx,1); renderForm(); updatePreviewAndATS(); saveToStorage(); }); });
        document.getElementById('addExpBtn')?.addEventListener('click', () => { formData.experiences.push({ title:'', company:'', year:'', desc:'' }); renderForm(); updatePreviewAndATS(); saveToStorage(); });
        document.querySelectorAll('#expContainer .remove-btn').forEach(btn => { btn.addEventListener('click', (e) => { const idx = parseInt(btn.getAttribute('data-idx')); formData.experiences.splice(idx,1); renderForm(); updatePreviewAndATS(); saveToStorage(); }); });
        // live updates for dynamic fields
        document.querySelectorAll('#eduContainer input, #expContainer input, #expContainer textarea').forEach(el => {
            el.addEventListener('input', (e) => {
                const card = e.target.closest('.entry-card');
                const isEdu = card.closest('#eduContainer') !== null;
                const idx = Array.from(card.parentNode.children).indexOf(card);
                if(isEdu) {
                    const field = e.target.classList.contains('edu-degree') ? 'degree' : (e.target.classList.contains('edu-school') ? 'school' : 'year');
                    formData.educations[idx][field] = e.target.value;
                } else {
                    const field = e.target.classList.contains('exp-title') ? 'title' : (e.target.classList.contains('exp-company') ? 'company' : (e.target.classList.contains('exp-year') ? 'year' : 'desc'));
                    formData.experiences[idx][field] = e.target.value;
                }
                updatePreviewAndATS(); saveToStorage();
            });
        });
    }

    // ---------- ATS SCORE & KEYWORD EXTRACTION (fake AI) ----------
    function calculateATSScore() {
        let jobText = (formData.jobDescription || '').toLowerCase();
        if(!jobText) return 0;
        let skills = formData.skills.toLowerCase();
        let summary = formData.summary.toLowerCase();
        let combined = skills + " " + summary;
        let keywords = extractKeywords(jobText);
        if(keywords.length === 0) return 0;
        let matched = keywords.filter(kw => combined.includes(kw)).length;
        let score = Math.min(100, Math.round((matched / keywords.length) * 100));
        return score;
    }
    function extractKeywords(text) {
        let words = text.split(/\s+/);
        let common = ['the','a','an','and','or','of','to','for','in','with','on','at','by','is','are','was','were','be','been','being','have','has','had','having','do','does','did','doing','but','not','this','that','these','those','from','as','will','can','should','could','would','may','might','must'];
        let filtered = words.filter(w => w.length > 3 && !common.includes(w)).slice(0,30);
        return [...new Set(filtered)];
    }
    function updateATS() {
        let score = calculateATSScore();
        document.getElementById('atsScore').innerText = score;
        let bar = document.getElementById('atsBar');
        if(score >= 70) { bar.style.background = '#22C55E'; bar.style.width = score+'%'; }
        else if(score >= 40) { bar.style.background = '#F59E0B'; bar.style.width = score+'%'; }
        else { bar.style.background = '#EF4444'; bar.style.width = score+'%'; }
        let feedback = '';
        if(score < 30) feedback = '⚠️ Low match. Add more keywords from the job description to your skills & summary.';
        else if(score < 70) feedback = '📈 Good start! Add 2-3 more missing keywords to boost your ATS score.';
        else feedback = '✅ Strong match! You’re ready to apply.';
        document.getElementById('keywordFeedback').innerHTML = feedback;
    }

    // ---------- ROAST MODE ----------
    function roastResume() {
        let summary = formData.summary;
        let bullets = formData.experiences.map(e => e.desc).join(' ');
        let issues = [];
        if (!summary || summary.length < 50) issues.push("❌ Summary is too short or missing. Add specific achievements.");
        if (bullets.includes("responsible for")) issues.push("🤨 \"Responsible for\" is weak. Use action verbs like \"Led\", \"Built\", \"Increased\".");
        if (bullets.includes("helped")) issues.push("⚡ \"Helped\" is passive. Quantify your impact: \"Increased X by Y%\".");
        if ((formData.skills || '').length < 20) issues.push("📚 List more relevant skills from the job description.");
        let roast = issues.length ? issues.join('<br>') : "🔥 Surprisingly solid! But still – add numbers and results everywhere. Now go apply.";
        alert("🔥 ROAST MODE 🔥\n\n" + roast);
    }

    // ---------- PREVIEW (5 templates) ----------
    function updatePreview() {
        const d = formData;
        const skillsArr = d.skills.split(',').map(s=>s.trim()).filter(s=>s);
        const linkedinLink = d.linkedin ? `<a href="${d.linkedin}" target="_blank">🔗 LinkedIn</a>` : '';
        const githubLink = d.github ? `<a href="${d.github}" target="_blank">💻 GitHub</a>` : '';
        let html = '';
        if(currentTemplate === 'forge') {
            html = `<div style="font-family: 'Geist', sans-serif;"><h1>${escapeHtml(d.fullName)}</h1><h3>${escapeHtml(d.jobTitle)}</h3><div>📧 ${d.email} | 📞 ${d.phone} | 📍 ${d.location}</div><div>${linkedinLink} ${githubLink}</div><hr><p>${escapeHtml(d.summary)}</p><h4>Skills</h4><div>${skillsArr.map(s=>`<span style="background:#f0f0f0;padding:4px 12px;border-radius:20px;">${s}</span>`).join('')}</div><h4>Experience</h4>${d.experiences.map(e=>`<div><strong>${e.title}</strong> at ${e.company} (${e.year})<br><small>${e.desc}</small></div>`).join('')}</div>`;
        } else if(currentTemplate === 'faang') {
            html = `<div style="font-family: 'Geist', sans-serif; max-width: 800px;"><h1>${escapeHtml(d.fullName)}</h1><h2>${escapeHtml(d.jobTitle)}</h2><div>${d.email} | ${d.phone}</div><hr><h3>Projects & Experience</h3>${d.experiences.map(e=>`<div><strong>⭐ ${e.title}</strong> @ ${e.company} (${e.year})<br>• ${e.desc}</div>`).join('')}<h3>Skills</h3>${skillsArr.map(s=>`<span style="background:#eef;margin:3px;padding:2px 8px;">${s}</span>`).join('')}</div>`;
        } else if(currentTemplate === 'anvil') {
            html = `<div style="font-family: 'Geist Mono', monospace;"><h1>${escapeHtml(d.fullName)}</h1><p>${d.email} | ${d.phone}</p><hr><h3>SUMMARY</h3><p>${d.summary}</p><h3>EXPERIENCE</h3>${d.experiences.map(e=>`<div><strong>${e.title}</strong>, ${e.company} (${e.year})<br>${e.desc}</div>`).join('')}<h3>SKILLS</h3>${skillsArr.join(', ')}</div>`;
        } else if(currentTemplate === 'spark') {
            html = `<div style="font-family: 'Geist', sans-serif;"><h1>${escapeHtml(d.fullName)}</h1><p>${d.jobTitle} | ${d.email}</p><h3>Education</h3>${d.educations.map(e=>`<div><strong>${e.degree}</strong> – ${e.school} (${e.year})</div>`).join('')}<h3>Projects</h3>${d.experiences.map(e=>`<div>📌 ${e.title} – ${e.desc}</div>`).join('')}<h3>Skills</h3>${skillsArr.join(', ')}</div>`;
        } else if(currentTemplate === 'phoenix') {
            html = `<div style="font-family: 'Geist', sans-serif;"><h1>${escapeHtml(d.fullName)}</h1><h3>${d.jobTitle}</h3><div>${d.summary}</div><h3>Core Skills</h3><div>${skillsArr.map(s=>`<span style="background:#f0f0f0;margin:3px;">${s}</span>`).join('')}</div><h3>Experience</h3>${d.experiences.map(e=>`<div><strong>${e.title}</strong> – ${e.company} (${e.year})<br>${e.desc}</div>`).join('')}</div>`;
        }
        document.getElementById('cvPreview').innerHTML = html;
    }

    function updatePreviewAndATS() { updatePreview(); updateATS(); }

    // ---------- TEMPLATE SWITCHER ----------
    function initTemplateSwitcher() {
        const btns = document.querySelectorAll('.temp-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                btns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTemplate = btn.getAttribute('data-temp');
                saveToStorage();
                updatePreviewAndATS();
            });
        });
        const activeBtn = Array.from(btns).find(b => b.getAttribute('data-temp') === currentTemplate);
        if(activeBtn) activeBtn.classList.add('active');
    }

    // ---------- LIGHT/DARK MODE ----------
    function initModeToggle() {
        const toggle = document.getElementById('modeToggle');
        const isLight = localStorage.getItem('theme') === 'light';
        if(isLight) document.body.classList.add('light');
        toggle.addEventListener('click', () => {
            document.body.classList.toggle('light');
            const nowLight = document.body.classList.contains('light');
            localStorage.setItem('theme', nowLight ? 'light' : 'dark');
            toggle.innerHTML = nowLight ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        });
        toggle.innerHTML = isLight ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }

    // ---------- PDF DOWNLOAD + ROAST BTN ----------
    document.getElementById('downloadBtn').addEventListener('click', () => window.print());
    document.getElementById('roastBtn').addEventListener('click', roastResume);

    // ---------- INIT ----------
    function init() {
        loadFromStorage();
        renderForm();
        updatePreviewAndATS();
        initTemplateSwitcher();
        initModeToggle();
        document.getElementById('jobDescription')?.addEventListener('input', (e) => { formData.jobDescription = e.target.value; updateATS(); saveToStorage(); });
    }
    init();
</script>
</body>
</html>
